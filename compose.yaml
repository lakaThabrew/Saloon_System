services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salon_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salon_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d salon_booking"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./salon-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/salon_booking
      SPRING_DATASOURCE_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-salon_dev_password}
      APP_CORS_ALLOWED_ORIGINS: http://localhost
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
